function togglePastData(pid) {
  var t = document.getElementById(pid);
  if (t) t.style.display = t.style.display === 'none' ? 'grid' : 'none';
}

function setExamCeHeight(el, px) {
  el.style.minHeight = px + 'px';
}

function examStrategySection(todayIso) {
  if (!_examSchedules.length) return '';

  var today      = new Date(todayIso);
  var DAYS_BEFORE = 28;
  var curNendo   = today.getMonth() >= 3 ? today.getFullYear() : today.getFullYear() - 1;
  var curNendoStr = String(curNendo);

  // 発火中のテスト種別を抽出（定期テスト日程の開始日28日前〜終了日）
  // ※年度に関係なく全日程を参照
  var activeTypes = [];
  _examSchedules.forEach(function(sc) {
    if (!sc.startDate) return;
    var start = new Date(sc.startDate);
    var end   = sc.endDate ? new Date(sc.endDate) : start;
    var threshold = new Date(start);
    threshold.setDate(threshold.getDate() - DAYS_BEFORE);
    if (today >= threshold && today <= end) {
      var daysLeft = Math.ceil((start - today) / 86400000);
      // 重複テスト種別はdaysLeftが小さい方（より近い）を優先
      var existing = activeTypes.find(function(a){ return a.testType === sc.testType; });
      if (!existing) {
        activeTypes.push({ testType: sc.testType, startDate: sc.startDate, endDate: sc.endDate, daysLeft: daysLeft });
      } else if (Math.abs(daysLeft) < Math.abs(existing.daysLeft)) {
        existing.daysLeft = daysLeft; existing.startDate = sc.startDate; existing.endDate = sc.endDate;
      }
    }
  });

  if (!activeTypes.length) return '';

  // レコードカード生成ヘルパー（今年度=通常色、過去=グレー）
  function makeRecCard(r, isPast) {
    var grades  = r.grade   ? r.grade.split(',').map(function(x){return x.trim();}).join('・') : '';
    var schools = r.schools ? r.schools.split(',').map(function(x){return x.trim();}).join(' ') : '';
    var yearStr = isPast ? (r.years||r.year||'') + '年度' : '';
    var bg      = isPast ? '#f9fafb' : '#fff';
    var border  = isPast ? '#e5e7eb' : '#e5e7eb';
    var subBg   = isPast ? '#e5e7eb' : '#dbeafe';
    var subCol  = isPast ? '#6b7280' : '#1e40af';
    var textCol = isPast ? '#9ca3af' : '#6b7280';
    // メタ情報を1行にまとめる
    var metaParts = [];
    if (grades)  metaParts.push(grades);
    if (schools) metaParts.push(schools);
    if (yearStr) metaParts.push(yearStr);
    // ホバーポップアップ用の全情報
    var popRows = '';
    popRows += '<div style="font-weight:700;font-size:13px;margin-bottom:6px">' + esc(r.unitName||'') + '</div>';
    if (r.subject) popRows += '<div style="display:flex;gap:6px;margin-bottom:3px"><span style="font-size:10px;font-weight:700;color:#6b7280;width:40px;flex-shrink:0;padding-top:1px">教科</span><span style="font-size:12px;flex:1">' + esc(r.subject) + '</span></div>';
    if (grades)    popRows += '<div style="display:flex;gap:6px;margin-bottom:3px"><span style="font-size:10px;font-weight:700;color:#6b7280;width:40px;flex-shrink:0;padding-top:1px">学年</span><span style="font-size:12px;flex:1">' + esc(grades) + '</span></div>';
    if (schools)   popRows += '<div style="display:flex;gap:6px;margin-bottom:3px"><span style="font-size:10px;font-weight:700;color:#6b7280;width:40px;flex-shrink:0;padding-top:1px">学校</span><span style="font-size:12px;flex:1">' + esc(schools) + '</span></div>';
    if (r.materials) popRows += '<div style="display:flex;gap:6px;margin-bottom:3px"><span style="font-size:10px;font-weight:700;color:#6b7280;width:40px;flex-shrink:0;padding-top:1px">教材</span><span style="font-size:12px;flex:1;color:#059669">' + esc(r.materials) + '</span></div>';
    if (yearStr)   popRows += '<div style="display:flex;gap:6px;margin-bottom:3px"><span style="font-size:10px;font-weight:700;color:#6b7280;width:40px;flex-shrink:0;padding-top:1px">年度</span><span style="font-size:12px;flex:1">' + esc(yearStr) + '</span></div>';
    var h = '<div class="rec-card-wrap">';
    h += '<div style="background:' + bg + ';border:1px solid ' + border + ';border-radius:5px;padding:5px 8px;opacity:' + (isPast?'0.75':'1') + '">';
    h += '<div style="display:flex;align-items:center;gap:5px;flex-wrap:nowrap;overflow:hidden">';
    h += '<span style="background:' + subBg + ';color:' + subCol + ';font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;flex-shrink:0">' + esc(r.subject||'') + '</span>';
    h += '<span style="font-size:12px;font-weight:700;color:' + (isPast?'#6b7280':'var(--text)') + ';white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(r.unitName) + '</span>';
    h += '</div>';
    if (metaParts.length) h += '<div style="font-size:10px;color:' + textCol + ';margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(metaParts.join('　')) + '</div>';
    if (r.materials) h += '<div style="font-size:10px;color:' + (isPast?'#9ca3af':'#059669') + ';margin-top:1px;display:flex;align-items:center;gap:3px"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;flex-shrink:0"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> ' + esc(r.materials) + '</div>';
    h += '</div>';
    var rcData = { title: (r.subject||'') + (r.unitName ? ' ' + r.unitName : ''), memo: (r.materials||''), school: (r.schools||''), grade: (r.grade||''), dueDate: '' };
    var rcDataStr = JSON.stringify(rcData).replace(/"/g, '\'');
    var btnStyle = isPast
      ? 'margin-top:4px;width:100%;background:#f3f4f6;border:none;color:#6b7280;border-radius:4px;padding:3px 0;font-size:11px;cursor:pointer'
      : 'margin-top:4px;width:100%;background:#eef2ff;border:none;color:#3730a3;border-radius:4px;padding:3px 0;font-size:11px;cursor:pointer';
    h += '<button onclick="event.stopPropagation();openEditExamFromCard(&quot;' + (r.recordId||'') + '&quot;)" title="編集" style="position:absolute;top:4px;right:4px;background:none;border:none;color:#9ca3af;cursor:pointer;padding:2px;line-height:1;border-radius:3px;transition:color .15s"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;flex-shrink:0"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>';
    h += '<button onclick="event.stopPropagation();openChecklistFromCard(' + rcDataStr + ')" style="' + btnStyle + '">+ チェックリスト化</button>';
    h += '<div class="rec-popup">' + popRows + '</div>';
    h += '</div>';
    return h;
  }

  var html = '';
  activeTypes.forEach(function(info, infoIdx) {
    var allRecs = _examStrategies.filter(function(s){ return s.testType === info.testType; });
    if (!allRecs.length) return;

    // 今年度レコードと過去レコードに分類
    var curRecs  = allRecs.filter(function(r){
      return (r.years || r.year || '').split(',').map(function(y){return y.trim();}).indexOf(curNendoStr) !== -1;
    });
    var pastRecs = allRecs.filter(function(r){
      return (r.years || r.year || '').split(',').map(function(y){return y.trim();}).indexOf(curNendoStr) === -1;
    });

    var urgency = info.daysLeft <= 7 ? 'background:#fef2f2;border-color:#fca5a5' :
                  info.daysLeft <= 14 ? 'background:#fffbeb;border-color:#fcd34d' :
                  'background:#eff6ff;border-color:#93c5fd';
    var ttColor = info.daysLeft <= 7 ? '#dc2626' : info.daysLeft <= 14 ? '#d97706' : '#1d4ed8';
    var countLabel = info.daysLeft > 0 ? '（テストまで' + info.daysLeft + '日）'
                   : info.daysLeft === 0 ? '（本日テスト！）' : '（テスト中）';

    html += '<div style="border:1px solid;border-radius:8px;padding:12px 14px;margin-top:12px;' + urgency + '">';
    html += '<div style="font-size:13px;font-weight:700;color:' + ttColor + ';margin-bottom:10px;display:flex;align-items:center;gap:5px"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;flex-shrink:0"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg> 定期テスト対策：' + esc(info.testType) + ' <span style="font-size:12px;font-weight:400">' + countLabel + '</span></div>';

    // ── 今年度データ ──
    if (curRecs.length) {
      html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:4px;margin-bottom:8px">';
      curRecs.forEach(function(r){ html += makeRecCard(r, false); });
      html += '</div>';
    } else {
      html += '<div style="font-size:12px;color:#9ca3af;margin-bottom:8px">' + curNendoStr + '年度のデータは未入力です</div>';
    }

    // ── 過去データ（折りたたみ） ──
    if (pastRecs.length) {
      var pastId = 'past_' + info.testType.replace(/[^a-zA-Z0-9]/g,'_') + '_' + infoIdx;
      // 最新年度を特定
      var latestPastYear = '';
      pastRecs.forEach(function(r){
        var ys = (r.years || r.year || '').split(',').map(function(y){return y.trim();}).filter(Boolean);
        ys.forEach(function(y){ if (!latestPastYear || y > latestPastYear) latestPastYear = y; });
      });
      html += '<div style="border-top:1px solid #e5e7eb;margin-top:4px;padding-top:8px">';
      html += '<div style="display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none" '
        + 'data-pid="' + pastId + '" onclick="togglePastData(this.dataset.pid)">';
      html += '<span style="font-size:11px;color:#6b7280">📂 過去データ（' + latestPastYear + '年度参照）</span>';
      html += '<span style="font-size:10px;color:#9ca3af">' + pastRecs.length + '件 ▼</span>';
      html += '</div>';
      html += '<div id="' + pastId + '" style="display:none;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:4px;margin-top:6px">';
      pastRecs.forEach(function(r){ html += makeRecCard(r, true); });
      html += '</div>';
      html += '</div>';
    }

    html += '</div>';
  });

  return html;
}

function alertBannersHtml(todayStudents, todayIso) {
  var now = new Date(todayIso);
  var ALERT_DAYS = 28;
  var banners = [];

  // SVGアイコン定義
  var SVG = {
    task:  '<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0"><path d="M10 12l2 2 4-4"/><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg>',
    test:  '<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>',
    event: '<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>'
  };

  // 種別ごとのカラー定義
  //  type: { normal: {bg,border,text,leftBorder}, urgent: {...} }
  var COLORS = {
    task: {
      normal: {bg:'#fff7ed', border:'#fed7aa', text:'#92400e', left:'#f97316'},
      urgent: {bg:'#fef2f2', border:'#fca5a5', text:'#991b1b', left:'#ef4444'}
    },
    test: {
      normal: {bg:'#fff1f2', border:'#fecdd3', text:'#9f1239', left:'#e11d48'},
      urgent: {bg:'#fef2f2', border:'#fca5a5', text:'#991b1b', left:'#ef4444'}
    },
    event: {
      normal: {bg:'#eff6ff', border:'#bfdbfe', text:'#1e40af', left:'#3b82f6'},
      urgent: {bg:'#fef2f2', border:'#fca5a5', text:'#991b1b', left:'#ef4444'}
    }
  };

  function getStyle(type, diff) {
    var c = diff <= 7 ? COLORS[type].urgent : COLORS[type].normal;
    return 'background:' + c.bg + ';border-color:' + c.border + ';color:' + c.text + ';border-left-color:' + c.left;
  }

  // ポップアップHTML生成ヘルパー
  function makePopup(svgIcon, title, dateLabel, matched, type) {
    var c = COLORS[type] || COLORS.task;
    var names = matched.map(function(s) {
      return '<span style="display:inline-block;background:' + c.normal.left + ';color:#fff;border-radius:3px;padding:1px 6px;font-size:10px;margin:2px 2px">' + esc(s.name) + '</span>';
    }).join('');
    return '<span class="alert-popup">'
      + '<span class="alert-popup-title">' + svgIcon + ' ' + esc(title) + '</span>'
      + '<span class="alert-popup-date">' + esc(dateLabel) + '</span>'
      + '<span class="alert-popup-students">' + names + '</span>'
      + '</span>';
  }

  function makeBanner(type, svgIcon, label, diff, matchedCount, popup, namesAttr, clData, editData) {
    var style = getStyle(type, diff);
    var clBtn = clData
      ? '<button onclick="event.stopPropagation();openChecklistFromCard(' + JSON.stringify(clData).replace(/"/g,'\'') + ')" '
        + 'style="flex-shrink:0;background:#fff;border:1px solid #c7d2fe;color:#3730a3;border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer;white-space:nowrap">+ チェックリスト化</button>'
      : '';
    var editBtn = editData
      ? '<button onclick="event.stopPropagation();openEditTestModal(' + JSON.stringify(editData).replace(/"/g,'\'') + ')" '
        + 'style="flex-shrink:0;background:#fff;border:1px solid #d1d5db;color:#374151;border-radius:4px;padding:2px 7px;font-size:11px;cursor:pointer;white-space:nowrap"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;flex-shrink:0"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>'
      : '';
    return '<div class="alert-banner" style="' + style + ';position:relative;display:flex;align-items:center;gap:6px" data-target-names="' + namesAttr + '" '
      + 'onmouseenter="highlightStudents(this)" onmouseleave="clearHighlight()">'
      + svgIcon
      + '<span style="flex:1">' + label + ' <span style="font-size:11px;opacity:.7">（' + matchedCount + '名）</span></span>'
      + editBtn + clBtn + popup + '</div>';
  }

  // ① 小テスト予定タスク
  _schoolTasks.forEach(function(task) {
    if (!task.dueDate) return;
    var diff = Math.ceil((new Date(task.dueDate) - now) / 86400000);
    if (diff < 0 || diff > ALERT_DAYS) return;
    var matched = todayStudents.filter(function(s) {
      return s.school === task.school && (!task.grade || task.grade.indexOf(s.grade) >= 0);
    });
    if (!matched.length) return;
    var namesAttr = JSON.stringify(matched.map(function(s) { return s.name; })).replace(/"/g, '&quot;');
    var dateLabel = (function(d){ var dt=new Date(d); return isNaN(dt)?d:isoDate(dt); })(task.dueDate) + '（残' + diff + '日）';
    var popup = makePopup(SVG.task, esc(task.school) + (task.grade ? ' ' + task.grade : '') + '：' + (task.taskName||''), dateLabel, matched, 'task');
    var label = esc(task.school) + (task.grade ? ' ' + esc(task.grade) + '生' : '')
      + '：<strong>' + esc(task.taskName||'') + '</strong> まで残<strong>' + diff + '日</strong>';
    var clData = { title: (task.taskName||''), memo: (task.materials||''), school: (task.school||''), grade: (task.grade||''), dueDate: (task.dueDate||'') };
    var editData = { taskId: (task.taskId||''), taskName: (task.taskName||''), school: (task.school||''), grade: (task.grade||''), dueDate: (task.dueDate||'') };
    banners.push(makeBanner('task', SVG.task, label, diff, matched.length, popup, namesAttr, clData, editData));
  });

  // ② テスト記録DB
  _testRecords.forEach(function(rec) {
    if (!rec.testDate) return;
    var diff = Math.ceil((new Date(rec.testDate) - now) / 86400000);
    if (diff < 0 || diff > ALERT_DAYS) return;
    var matched = todayStudents.filter(function(s) {
      return s.school === rec.school && s.grade === rec.grade;
    });
    if (!matched.length) return;
    var alreadyCovered = _schoolTasks.some(function(t) {
      return t.school === rec.school && t.grade && t.grade.indexOf(rec.grade) >= 0 &&
        Math.abs(Math.ceil((new Date(t.dueDate) - now) / 86400000) - diff) <= 3;
    });
    if (alreadyCovered) return;
    var namesAttr = JSON.stringify(matched.map(function(s) { return s.name; })).replace(/"/g, '&quot;');
    var dateLabel = (function(d){ var dt=new Date(d); return isNaN(dt)?d:isoDate(dt); })(rec.testDate) + '（残' + diff + '日）';
    var popup = makePopup(SVG.test, rec.school + ' ' + rec.grade + '：' + rec.testName, dateLabel, matched, 'test');
    var label = esc(rec.school) + ' ' + esc(rec.grade) + '：<strong>' + esc(rec.testName) + '</strong> まで残<strong>' + diff + '日</strong>';
    banners.push(makeBanner('test', SVG.test, label, diff, matched.length, popup, namesAttr));
  });

  // ③ 学校行事
  _schoolEvents.forEach(function(ev) {
    if (!ev.eventDate) return;
    var diff = Math.ceil((new Date(ev.eventDate) - now) / 86400000);
    var endDiff = ev.eventEndDate ? Math.ceil((new Date(ev.eventEndDate) - now) / 86400000) : diff;
    if (endDiff < 0 || diff > ALERT_DAYS) return;
    var matched = todayStudents.filter(function(s) {
      return s.school === ev.school && (!ev.grade || ev.grade === s.grade);
    });
    if (!matched.length) return;
    var namesAttr = JSON.stringify(matched.map(function(s) { return s.name; })).replace(/"/g, '&quot;');
    function fmtDate(d) { if (!d) return ''; var dt=new Date(d); return isNaN(dt)?String(d):isoDate(dt); }
    var evStart = fmtDate(ev.eventDate);
    var evEnd   = fmtDate(ev.eventEndDate);
    var dateLabel = evStart + (evEnd ? ' 〜 ' + evEnd : '') + '（残' + diff + '日）';
    var popup = makePopup(SVG.event, ev.school + (ev.grade ? ' ' + ev.grade : '') + '：' + ev.eventName, dateLabel, matched, 'event');
    var label = esc(ev.school) + (ev.grade ? ' ' + esc(ev.grade) : '')
      + '：<strong>' + esc(ev.eventName) + '</strong> まで残<strong>' + diff + '日</strong>';
    banners.push(makeBanner('event', SVG.event, label, diff, matched.length, popup, namesAttr));
  });

  // ④ 本日振替予定の生徒アラート（欠席振替機能）
  var todaySubRecords = (_absenceRecords || []).filter(function(r) {
    return r.substituteDate === todayIso && r.status === 'scheduled';
  });
  if (todaySubRecords.length) {
    var subNames = todaySubRecords.map(function(r) {
      return '<strong>' + esc(r.studentName) + '</strong>（' + esc(r.substituteKomaTime||'') + '）';
    }).join('、');
    banners.unshift(
      '<div class="alert-banner" style="background:#fffbeb;border-color:#fbbf24;color:#92400e;border-left-color:#f59e0b">' +
      '<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>' +
      '<span>⚡ 本日振替来塾予定：' + subNames + '</span></div>'
    );
  }

  if (!banners.length) return '';
  // 振替アラートは全幅（grid-column:1/-1）で表示
  var bannersHtml = banners.map(function(b) {
    if (b.indexOf('⚡') >= 0) {
      return '<div style="grid-column:1/-1">' + b + '</div>';
    }
    return b;
  }).join('');
  return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">' + bannersHtml + '</div>';
}

function buildWeekGrid(days, todayIso) {
  var YOUBIS = ['月','火','水','木','金','土'];
  var cr = _currentClassroom;
  var crCls = cr === '北久里浜' ? ' cr-kita' : ' cr-kuri';
  // 全教室のコマを統合して行を揃える（ないコマはグレーセルで表示）
  var komasAll = [];
  var komasSeen = {};
  ['北久里浜','久里浜'].forEach(function(crAll) {
    getKomasForClassroom(crAll).forEach(function(kt) {
      if (!komasSeen[kt]) { komasSeen[kt] = true; komasAll.push(kt); }
    });
  });
  komasAll.sort(function(a, b) {
    var ta = parseInt((a || '').replace(':','').substring(0,4)) || 0;
    var tb = parseInt((b || '').replace(':','').substring(0,4)) || 0;
    return ta - tb;
  });
  var komas = komasAll;
  var weekStartIso = isoDate(days[0]);
  var weekEndIso   = isoDate(days[5]);

  // 各日に生徒がいるか判定
  var dayHasStudent = days.map(function(d, i) {
    return komas.some(function(kt) {
      return getStudentsForKoma(cr, YOUBIS[i], kt).length > 0;
    });
  });

  // 空の日は minmax(32px,auto)、生徒ありは 1fr
  var colDefs = days.map(function(d, i) { return dayHasStudent[i] ? 'minmax(0, 1fr)' : '20px'; });
  var gridStyle = 'grid-template-columns: 68px ' + colDefs.join(' ') + ';';

  // ===== タスクチップ生成（曜日別） =====
  function dayTaskChip(t) {
    var isOverdue = t.dueDate < todayIso;
    var cls = isOverdue ? 'chip-overdue' : (t.taskType === '授業内' ? 'chip-in' : 'chip-out');
    var popup = '<span class="t-popup">' +
      '<div class="t-popup-title">' + esc(t.title) + '</div>' +
      '<div class="t-popup-row"><span class="t-popup-label">期限</span><span class="t-popup-val">' + esc(t.dueDate || '—') + '</span></div>' +
      '<div class="t-popup-row"><span class="t-popup-label">担当</span><span class="t-popup-val">' + esc(t.assignee || '—') + '</span></div>' +
      '<div class="t-popup-row"><span class="t-popup-label">種別</span><span class="t-popup-val">' + esc(t.taskType || '—') + '</span></div>' +
      (t.memo ? '<div class="t-popup-memo">' + esc(t.memo) + '</div>' : '') +
      '</span>';
    var timeLabel2 = t.dueTime ? '<span style="font-size:10px;opacity:.7"> ' + esc(t.dueTime) + '</span>' : '';
    return '<span class="task-chip-1line ' + cls + '" onclick="openTaskModal(\'' + t.id + '\')">' +
      esc(t.title) + (t.assignee ? ' ' + esc(t.assignee) : '') + timeLabel2 + popup + '</span>';
  }

  function dayTaskCellHtml(iso, todayCls, isEmpty) {
    if (isEmpty) return '<div class="wg-task-cell wg-task-cell-empty' + todayCls + '"></div>';
    // その日のタスク＋期限切れ（今日列にまとめる）
    var dayTasks = _tasks.filter(function(t) {
      var crMatch = !t.classroom || t.classroom === cr;
      return t.dueDate === iso && t.status !== 'done' &&
        (t.taskType === '授業内' || t.taskType === '授業外') && crMatch;
    });
    var overdueTasks = (iso === todayIso) ? _tasks.filter(function(t) {
      var crMatch = !t.classroom || t.classroom === cr;
      return t.dueDate && t.dueDate < todayIso && t.status !== 'done' &&
        (t.taskType === '授業内' || t.taskType === '授業外') && crMatch;
    }) : [];
    var allTasks = overdueTasks.concat(dayTasks);
    if (!allTasks.length) return '<div class="wg-task-cell' + todayCls + '"></div>';
    // 授業内・授業外に分けて表示
    var inTasks  = allTasks.filter(function(t){ return t.taskType === '授業内'; });
    var outTasks = allTasks.filter(function(t){ return t.taskType === '授業外'; });
    var inner = '';
    if (outTasks.length) inner += '<div class="wg-task-group"><span class="wg-task-type-label out">授業外</span>' + outTasks.map(dayTaskChip).join('') + '</div>';
    if (inTasks.length)  inner += '<div class="wg-task-group"><span class="wg-task-type-label in">授業内</span>' + inTasks.map(dayTaskChip).join('') + '</div>';
    return '<div class="wg-task-cell has-task' + todayCls + '">' + inner + '</div>';
  }

  // ===== ヘッダー行（曜日・日付） =====
  var header = '<div class="wg-label wg-label-top"></div>' +
    days.map(function(d, i) {
      var iso = isoDate(d);
      var todayCls = iso === todayIso ? ' today-col' : '';
      var emptyCls = dayHasStudent[i] ? '' : ' day-empty';
      return '<div class="wg-head' + todayCls + emptyCls + '">' +
        YOUBIS[i] + '<div class="wg-date">' + (d.getMonth()+1) + '/' + d.getDate() + '</div>' +
        '</div>';
    }).join('');

  // ===== タスク行（ヘッダー直下） =====
  var taskRow = '<div class="wg-label wg-task-label" style="display:flex;align-items:center;justify-content:center;gap:3px"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;flex-shrink:0"><path d="m9 11 3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg> タスク</div>' +
    days.map(function(d, i) {
      var iso = isoDate(d);
      var todayCls = iso === todayIso ? ' today-col' : '';
      return dayTaskCellHtml(iso, todayCls, !dayHasStudent[i]);
    }).join('');

  // ===== コマ行（生徒カード） =====
  var komaRows = komas.map(function(kt) {
    var label = '<div class="wg-label">' + esc(kt) + '</div>';
    var cells = days.map(function(d, i) {
      var iso = isoDate(d);
      var ss = getStudentsForKoma(cr, YOUBIS[i], kt);
      var todayCls = iso === todayIso ? ' today-col' : '';
      var emptyCls = dayHasStudent[i] ? '' : ' day-empty';
      var crHasKoma = getKomasForClassroom(cr).indexOf(kt) >= 0;
      if (!crHasKoma) {
        // この教室にこのコマ設定がない → グレーアウトセル
        return '<div class="wg-cell wg-cell-no-koma' + todayCls + emptyCls + '"></div>';
      }
      // 振替でこのコマに来る生徒（通常コマにいない生徒も含む）
      var subStudents = (_absenceRecords || []).filter(function(r) {
        return r.substituteDate === iso &&
               r.substituteKomaTime === kt &&
               r.substituteClassroom === cr &&
               r.status === 'scheduled' &&
               !ss.find(function(s){ return s.name === r.studentName; }); // 通常コマにいない生徒のみ
      });
      var subChips = subStudents.map(function(r) {
        // 振替生徒は _students から情報を引く
        var stu = (_students || []).find(function(s){ return s.name === r.studentName; }) || { name: r.studentName };
        return studentChipHtml(stu, {classroom:cr, komaTime:kt, youbi:YOUBIS[i], dateStr:iso, absenceCourse: r.absenceCourse || ''});
      });
      var normalChips = ss.map(function(s){return studentChipHtml(s,{classroom:cr,komaTime:kt,youbi:YOUBIS[i],dateStr:iso});});
      var allChips = normalChips.concat(subChips);
      var _wCnt = komaCountLabel_(ss, iso, kt, cr);
      // 最終有生徒コマなら受験特訓人数も加算
      var _dayKomasW = komas.filter(function(k2){ return getStudentsForKoma(cr, YOUBIS[i], k2).length > 0; });
      var _isLastW = _dayKomasW.length > 0 && _dayKomasW[_dayKomasW.length-1] === kt;
      var _jukenCountW = 0;
      if (_isLastW) {
        _jukenCountW = getActiveModeStudents().filter(function(s) {
          return (s.komas||[]).some(function(k2){ return k2.satType==='juken' && k2.youbi===YOUBIS[i]; }) && getMainClassroom(s)===cr;
        }).length;
      }
      var _wBase = (_wCnt && typeof _wCnt === 'object') ? _wCnt.total : 0;
      var _wTotal = _wBase + _jukenCountW;
      var _wLabel = (_wCnt && typeof _wCnt === 'object') ? _wCnt.label.replace('（計' + _wBase + '人）', '（計' + _wTotal + '人）') : '';
      var _wCls = _wTotal >= 15 ? ' count-danger' : _wTotal >= 12 ? ' count-warn' : '';
      var _wTitle = ' title="12人以上：黄色 / 15人以上：赤"';
      var wgCountDiv = _wTotal > 0 ? '<div class="wg-count' + _wCls + '"' + _wTitle + '>' + _wLabel + '</div>' : '';
      // 最終コマに受験特訓を相乗り
      // 両教室統合後の最終コマでなく、その日その教室で生徒がいる最後のコマを使う
      var jukenBlockW = '';
      var jukenStu = getActiveModeStudents().filter(function(s) {
        return (s.komas || []).some(function(k2) { return k2.satType === 'juken' && k2.youbi === YOUBIS[i]; })
          && getMainClassroom(s) === cr;
      });
      if (jukenStu.length > 0) {
        // その日その教室で生徒がいるコマのうち最後のコマを判定
        var dayKomasWithStudents = komas.filter(function(k2) {
          return getStudentsForKoma(cr, YOUBIS[i], k2).length > 0;
        });
        var lastActiveKoma = dayKomasWithStudents.length > 0 ? dayKomasWithStudents[dayKomasWithStudents.length - 1] : null;
        var isLastActiveKoma = lastActiveKoma && lastActiveKoma === kt;
        if (isLastActiveKoma) {
          jukenBlockW = '<div style="margin-top:4px;padding-top:4px;border-top:1px dashed #e5e7eb">' +
            '<div style="font-size:9px;color:#6d28d9;font-weight:700;margin-bottom:2px">受験特訓 19:00〜21:30</div>' +
            jukenStu.map(function(s){ return studentChipHtml(s,{classroom:cr,komaTime:'19:00〜21:30',youbi:YOUBIS[i],dateStr:iso,isJuken:true}); }).join('') +
            '</div>';
        }
      }
      return '<div class="wg-cell' + todayCls + emptyCls + '">' +
        (allChips.length || jukenBlockW
          ? wgCountDiv + allChips.join('') + jukenBlockW
          : (dayHasStudent[i] ? '<span style="color:#ccc;font-size:11px">—</span>' : ''))
        + '</div>';
    }).join('');
    return label + cells;
  }).join('');

  return '<div class="week-grid' + crCls + '" style="' + gridStyle + '" id="week-grid-main">' +
    header + taskRow + komaRows + '</div>';
}
function renderModeTabs() {

    html += '<div class="mode-tab' + (m.modeId === _currentMode ? ' active' : '') + '">' +

function renderSchool() {
  var schoolSet = {};
  _students.forEach(function(s) { if (s.school) schoolSet[s.school] = true; });
  _schoolInfo.forEach(function(si) { if (si.school) schoolSet[si.school] = true; });
  var schools = Object.keys(schoolSet).sort();

  var html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">' +
    '<div style="font-weight:700;font-size:15px">学校一覧（' + schools.length + '校）</div>' +
    '<button class="btn-primary btn-sm" onclick="openModal(\'modal-add-school\')">  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;flex-shrink:0"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> 学校を追加</button></div>';

  if (!schools.length) {
    html += '<div class="card"><div class="card-body"><p style="color:var(--text-muted)">GAS URLを設定して生徒データを読み込むと学校が表示されます。</p></div></div>';
    document.getElementById('main-content').innerHTML = html;
    return;
  }

  // 小学校・中高校に分離
  var elemSchools   = schools.filter(function(s) { return s.indexOf('小') >= 0; });
  var middleSchools = schools.filter(function(s) { return s.indexOf('小') < 0; });
  var WORK_SUBJECTS = ['英語','数学','国語（読解）','国語（漢字）','理科','社会（地理）','社会（歴史）','社会（公民）'];
  var today = isoDate(new Date());

  function renderSchoolGrid(sectionSchools) {
    var g = '<div class="school-grid">';
    sectionSchools.forEach(function(schoolName) {
      var enrolled = _students.filter(function(s) { return s.school === schoolName; });

      // ワーク「なし」教科を学年別に集計（中1/中2/中3のみ）
      var CHUU_GRADES = ['中1','中2','中3'];
      var noneSubjects = {};  // 教科 → true（いずれかの学年で「なし」）
      var noneByGrade  = {}; // 教科 → { 中1:'なし', 中2:'配布済', 中3:'未確認', ... }
      var uncheckedSubjects = {};
      _schoolWorks.filter(function(w) { return w.school === schoolName; }).forEach(function(w) {
        if (CHUU_GRADES.indexOf(w.grade) === -1) return; // 中学3学年のみ対象
        var checks = w.checks || {};
        WORK_SUBJECTS.forEach(function(subj) {
          var v = checks[subj] || '未確認';
          if (!noneByGrade[subj]) noneByGrade[subj] = {};
          noneByGrade[subj][w.grade] = v;
          if (v === 'なし') noneSubjects[subj] = true;
          else if (v === '未確認' && !noneSubjects[subj]) uncheckedSubjects[subj] = true;
        });
      });
      var noneList = Object.keys(noneSubjects);
      var uncheckedList = Object.keys(uncheckedSubjects).filter(function(s) { return !noneSubjects[s]; });

      // 直近行事（今日以降で最も近い）
      var upcomingEvents = _schoolEvents
        .filter(function(ev) { return ev.school === schoolName && ev.eventDate >= today; })
        .sort(function(a,b) { return a.eventDate > b.eventDate ? 1 : -1; });
      var nextEvent = upcomingEvents[0] || null;

      // 直近小テスト（今日以降で最も近い）
      var upcomingTests = _schoolTasks
        .filter(function(t) { return t.school === schoolName && t.dueDate >= today; })
        .sort(function(a,b) { return a.dueDate > b.dueDate ? 1 : -1; });
      var nextTest = upcomingTests[0] || null;

      // カード生成
      var cardId = 'sc_card_' + schoolName.replace(/[^a-zA-Z0-9]/g,'_');
      g += '<div class="school-summary-card" onclick="openSchoolDetail(this.dataset.school)" data-school="' + esc(schoolName) + '" id="' + cardId + '">';

      // ヘッダー
      g += '<div class="ssc-header">' +
        '<span class="ssc-name">🏫 ' + esc(schoolName) + '</span>' +
        '<span class="ssc-count">' + enrolled.length + '名</span>' +
        '</div>';

      // ワーク「なし」教科
      // ワーク表示：「なし」教科のみカードに表示。未確認は詳細パネルへ
      if (noneList.length) {
        g += '<div class="ssc-row">' +
          noneList.map(function(subj) {
            // ホバーポップアップ：学年別の配布状況
            var gradeRows = CHUU_GRADES.map(function(gr) {
              var v = (noneByGrade[subj] && noneByGrade[subj][gr]) || '未確認';
              var color = v === 'なし' ? '#dc2626' : v === '配布済' ? '#16a34a' : '#9ca3af';
              return '<span style="display:flex;justify-content:space-between;gap:12px">'
                + '<span>' + gr + '</span>'
                + '<span style="color:' + color + ';font-weight:700">' + v + '</span>'
                + '</span>';
            }).join('');
            return '<span class="ssc-badge ssc-badge-none" style="position:relative;cursor:default">'
              + subj
              + '<span class="ssc-badge-popup">'
              + '<span style="font-weight:700;margin-bottom:4px;display:block">' + subj + '</span>'
              + gradeRows
              + '</span>'
              + '</span>';
          }).join('') + '</div>';
      } else {
        g += '<div class="ssc-row" style="color:#16a34a;font-size:11px">✓ ワーク配布なし教科なし</div>';
      }

      // 直近行事
      if (nextEvent) {
        var dateStr = isoDate(new Date(nextEvent.eventDate));
        if (nextEvent.eventEndDate) dateStr += '〜' + isoDate(new Date(nextEvent.eventEndDate)).slice(5);
        g += '<div class="ssc-row ssc-event" style="display:flex;align-items:center;gap:4px"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> ' + dateStr + ' ' + esc(nextEvent.eventName) +
          (nextEvent.grade ? ' <span class="badge badge-gray" style="font-size:9px">' + esc(nextEvent.grade) + '</span>' : '') + '</div>';
      }

      // 直近小テスト
      if (nextTest) {
        g += '<div class="ssc-row ssc-test" style="display:flex;align-items:center;gap:4px"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;flex-shrink:0"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg> ' + esc(nextTest.dueDate || '') + ' ' +
          (nextTest.grade ? '<span class="badge badge-gray" style="font-size:9px">' + esc(nextTest.grade) + '</span> ' : '') +
          esc(nextTest.taskName || '') + '</div>';
      }

      g += '</div>'; // school-summary-card
    });
    g += '</div>'; // school-grid
    return g;
  }

  function renderSection(label, sectionSchools, defaultOpen) {
    if (!sectionSchools.length) return '';
    var sid = 'school-section-' + (label === '小学校' ? 'elem' : 'middle');
    return '<div class="sc-school-section-header" onclick="toggleSchoolSection(this.dataset.sid)" data-sid="' + sid + '">' +
      '<span class="sc-section-toggle-icon" id="' + sid + '-icon">' + (defaultOpen ? '▼' : '▶') + '</span>' +
      '<span>' + label + '</span>' +
      '<span style="font-size:12px;color:var(--text-muted);font-weight:400">（' + sectionSchools.length + '校）</span>' +
      '</div>' +
      '<div id="' + sid + '" style="display:' + (defaultOpen ? 'block' : 'none') + '">' +
      renderSchoolGrid(sectionSchools) +
      '</div>';
  }

  html += renderSection('中学校・高校', middleSchools, true);
  html += renderSection('小学校', elemSchools, false);

  document.getElementById('main-content').innerHTML = html;
}


function getTestNamesForSchoolGrade(school, grade) {

  var existing = _testRecords
    .filter(function(r) { return r.school === school && r.grade === grade; })
    .map(function(r) { return r.testName; });
  var all = DEFAULT_TEST_NAMES.concat(existing.filter(function(n) { return DEFAULT_TEST_NAMES.indexOf(n) < 0; }));

}

function switchTestTab(sid, grade, testName, el) {

  var tabs = Array.from(el.parentElement.querySelectorAll('.sc-test-tab'));

function addTestNamePrompt(school, grade) {
  var name = prompt('テスト名を入力してください（例：夏期確認テスト）');
  if (!name || !name.trim()) return;
  name = name.trim();
  // 新規レコードとして保存（教科メモ空）
  var url = localStorage.getItem(GAS_STUDENT_URL_KEY) || '';
  if (!url) { miniToast('GAS URLが未設定です'); return; }
  callGas(url, { action: 'saveTestRecord', record: JSON.stringify({
    school: school, grade: grade, testName: name, year: new Date().getFullYear().toString(), subjectMemos: {}
  })}, function(res) {
    if (res && res.success) {
      miniToast('追加しました ✓');
      reloadTestRecords();
    } else miniToast('エラー');
  }, 'POST');
}

function saveSubjectMemo(textarea) {
  var school    = textarea.getAttribute('data-school');
  var grade     = textarea.getAttribute('data-grade');
  var testName  = textarea.getAttribute('data-testname');
  var subject   = textarea.getAttribute('data-subject');
  var recordId  = textarea.getAttribute('data-recordid');
  var val       = textarea.value;

  // 既存レコードを探してメモを更新
  var rec = _testRecords.find(function(r) {
    return r.school === school && r.grade === grade && r.testName === testName;
  });
  if (rec) {
    rec.subjectMemos[subject] = val;
  } else {
    rec = { recordId: recordId, school: school, grade: grade, testName: testName,
      year: new Date().getFullYear().toString(), subjectMemos: {} };
    rec.subjectMemos[subject] = val;
    _testRecords.push(rec);
  }

  var url = localStorage.getItem(GAS_STUDENT_URL_KEY) || '';
  if (!url) { miniToast('GAS URLが未設定です'); return; }
  callGas(url, { action: 'saveTestRecord', record: JSON.stringify(rec) }, function(res) {
    if (res && res.success) {
      // recordIdを更新（新規作成時）
      if (res.recordId) {
        textarea.setAttribute('data-recordid', res.recordId);
        rec.recordId = res.recordId;
      }
      localStorage.setItem('cb_cache_test_records', JSON.stringify(_testRecords));
      miniToast('保存 ✓');
    } else miniToast('保存エラー');
  }, 'POST');
}

function reloadTestRecords() {
  var url = localStorage.getItem(GAS_STUDENT_URL_KEY) || '';
  if (!url) return;
  callGas(url, { action: 'getTestRecords' }, function(res) {
    if (res && res.success && res.records) {
      _testRecords = res.records;
      localStorage.setItem('cb_cache_test_records', JSON.stringify(_testRecords));
      renderSchool();
    }
  });
}

function submitAddTest() {
  miniToast('保存中...');
  var school = document.getElementById('test-target-school').value;
  var taskId = document.getElementById('test-edit-task-id').value;
  var name   = document.getElementById('test-name').value.trim();
  var start  = document.getElementById('test-start-date').value;
  var grades = Array.from(document.querySelectorAll('.test-grade:checked')).map(function(cb) { return cb.value; });
  var subjects = Array.from(document.querySelectorAll('#test-subj-btns .subj-btn.active')).map(function(b){ return b.getAttribute('data-subj'); });
  if (!school) { miniToast('学校を選択してください'); return; }
  if (!start) { miniToast('実施日を入力してください'); return; }
  var _tnParts = [];
  if (subjects.length) _tnParts.push(subjects.join('・'));
  if (name) _tnParts.push(name);
  var taskName = _tnParts.join('　') || '小テスト';
  var task = { school: school, taskName: taskName, grade: grades.join('・'), dueDate: start, status: '対策中', memo: '' };
  if (taskId) task.taskId = taskId;
  var url = localStorage.getItem(GAS_STUDENT_URL_KEY) || '';
  if (!url) { miniToast('GAS URLが未設定です'); return; }
  callGas(url, { action: 'saveSchoolTask', task: JSON.stringify(task) }, function(res) {
    if (res && res.success) {
      closeModal('modal-add-test');
      miniToast('保存しました ✓');
      callGas(url, { action: 'getSchoolTasks' }, function(r) {
        if (r && r.success && r.tasks) { _schoolTasks = r.tasks; localStorage.setItem('cb_cache_school_tasks', JSON.stringify(_schoolTasks)); }
        renderSchool();
        if (_currentSchoolDetail) openSchoolDetail(_currentSchoolDetail);
      });
    } else miniToast('保存エラー');
  }, 'POST');
}

function deleteTest(taskId) {
  if (!taskId || !confirm('このテスト予定を削除しますか？')) return;
  miniToast('削除中...');
  var url = localStorage.getItem(GAS_STUDENT_URL_KEY) || '';
  if (!url) { miniToast('GAS URLが未設定です'); return; }
  callGas(url, { action: 'deleteSchoolTask', taskId: taskId }, function(res) {
    if (res && res.success) {
      _schoolTasks = _schoolTasks.filter(function(t) { return t.taskId !== taskId; });
      localStorage.setItem('cb_cache_school_tasks', JSON.stringify(_schoolTasks));
      miniToast('削除しました ✓');
      renderSchool();
      if (_currentSchoolDetail) openSchoolDetail(_currentSchoolDetail);
    } else miniToast('削除エラー');
  }, 'POST');
}


// =====================================================
// 定期テストタブ
// =====================================================
var EXAM_TEST_TYPES = ['前期中間','前期期末','後期中間','学年末'];
var EXAM_SUBJECTS   = ['英語','数学','国語','理科','社会','実技'];
var EXAM_GRADES     = ['中1','中2','中3','高1','高2','高3'];

function getExamYearOptions() {
  var now = new Date().getFullYear();
  var years = [];
  for (var y = now - 2; y <= now + 1; y++) years.push(String(y));
  // 既存レコードに含まれる年度も追加
  _examStrategies.forEach(function(s) {
    (s.years || '').split(',').forEach(function(y) {
      y = y.trim();
      if (y && years.indexOf(y) === -1) years.push(y);
    });
  });
  years.sort();
  return years;
}

function renderExam() {
  var el = document.getElementById('main-content');
  var yearOpts = getExamYearOptions();
  if (_examYearFilter === null) _examYearFilter = String(new Date().getFullYear());

  // フィルタ後レコード
  var filtered = _examStrategies.filter(function(s) {
    var gradeOK   = (_examGradeFilter === 'all') || (s.grade || '').split(',').map(function(g){return g.trim();}).indexOf(_examGradeFilter) !== -1;
    var subjectOK = (_examSubjectFilter === 'all') || s.subject === _examSubjectFilter;
    var yearOK    = !_examYearFilter || (s.years || '').split(',').map(function(y){return y.trim();}).indexOf(_examYearFilter) !== -1;
    return gradeOK && subjectOK && yearOK;
  });

  // テスト種別グループ
  var groups = {};
  EXAM_TEST_TYPES.forEach(function(t) { groups[t] = []; });
  filtered.forEach(function(s) {
    if (groups[s.testType] !== undefined) groups[s.testType].push(s);
    else {
      if (!groups['その他']) groups['その他'] = [];
      groups['その他'].push(s);
    }
  });

  // テスト日程セクション
  var schedHtml = '<div style="background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:12px 14px;margin-bottom:16px">';
  schedHtml += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
  schedHtml += '<div style="font-size:13px;font-weight:700;color:#15803d;display:flex;align-items:center;gap:5px"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> 定期テスト日程</div>';
  schedHtml += '<button class="btn-sm" style="background:#15803d;color:#fff;border:none;padding:4px 10px;border-radius:5px;font-size:12px;cursor:pointer" onclick="openExamScheduleModal()"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;flex-shrink:0"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> 定期テスト日程を追加</button>';
  schedHtml += '</div>';

  // テスト日程は常に最新年度（現在年度）を表示
  var schedYear = String(new Date().getFullYear());
  var schedFiltered = _examSchedules.filter(function(sc){ return sc.year === schedYear; });
  if (schedFiltered.length === 0) {
    schedHtml += '<div style="color:#6b7280;font-size:12px">' + schedYear + '年度の日程は未登録です</div>';
  } else {
    schedHtml += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px">';
    EXAM_TEST_TYPES.forEach(function(tt) {
      var sc = schedFiltered.find(function(s){ return s.testType === tt; });
      if (!sc) return;
      var dStart = sc.startDate ? sc.startDate.replace(/-(\d+)$/, function(_,d){return '-'+d;}) : '未設定';
      var dEnd   = sc.endDate   ? sc.endDate.replace(/-(\d+)$/, function(_,d){return '-'+d;}) : '';
      var label  = dEnd ? dStart + ' 〜 ' + dEnd : dStart;
      schedHtml += '<div style="background:#fff;border:1px solid #86efac;border-radius:6px;padding:8px 10px;display:flex;align-items:center;justify-content:space-between">';
      schedHtml += '<div>';
      schedHtml += '<div style="font-size:12px;font-weight:700;color:#15803d">' + esc(tt) + '</div>';
      schedHtml += '<div style="font-size:11px;color:#374151;margin-top:2px">' + esc(label) + '</div>';
      schedHtml += '</div>';
      schedHtml += '<button class="btn-sm" style="background:#fee2e2;color:#dc2626;border:none;padding:2px 8px;border-radius:4px;font-size:11px;cursor:pointer" '
        + 'data-sid="' + sc.scheduleId + '" onclick="deleteExamSchedule(this.dataset.sid)">削除</button>';
      schedHtml += '</div>';
    });
    schedHtml += '</div>';
  }
  schedHtml += '</div>';

  var html = schedHtml;
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'
    + '<div style="font-size:15px;font-weight:700">定期テスト対策DB</div>'
    + '<button class="btn-primary btn-sm" onclick="addNewExamCard()"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;flex-shrink:0"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> 追加</button>'
    + '</div>';

  // 学年フィルタ
  html += '<div class="sc-grade-tabs" style="margin-bottom:10px">';
  html += '<div class="sc-grade-tab' + (_examGradeFilter==='all'?' active':'') + '" data-ftype="grade" data-fval="all" onclick="setExamFilter(this.dataset.ftype,this.dataset.fval)">全学年</div>';
  EXAM_GRADES.forEach(function(g) {
    html += '<div class="sc-grade-tab' + (_examGradeFilter===g?' active':'') + '" data-ftype="grade" data-fval="' + g + '" onclick="setExamFilter(this.dataset.ftype,this.dataset.fval)">' + g + '</div>';
  });
  html += '</div>';

  // 教科フィルタ
  html += '<div class="sc-test-tabs" style="margin-bottom:10px">';
  html += '<div class="sc-test-tab' + (_examSubjectFilter==='all'?' active':'') + '" data-ftype="subject" data-fval="all" onclick="setExamFilter(this.dataset.ftype,this.dataset.fval)">全教科</div>';
  EXAM_SUBJECTS.forEach(function(s) {
    html += '<div class="sc-test-tab' + (_examSubjectFilter===s?' active':'') + '" data-ftype="subject" data-fval="' + s + '" onclick="setExamFilter(this.dataset.ftype,this.dataset.fval)">' + s + '</div>';
  });
  html += '</div>';

  // 年度フィルタ
  html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:13px">'
    + '<span style="color:var(--text-muted);font-weight:600">年度：</span>'
    + '<select onchange="setExamFilter(\'year\',this.value)" style="font-size:13px;padding:3px 8px;border:1px solid var(--border);border-radius:5px">';
  html += '<option value="">全年度</option>';
  yearOpts.forEach(function(y) {
    html += '<option value="' + y + '"' + (_examYearFilter===y?' selected':'') + '>' + y + '年度</option>';
  });
  html += '</select>';
  html += '<span style="color:var(--text-muted);font-size:12px">' + filtered.length + '件</span>';
  html += '</div>';

  // 教科の色定義
  var SUBJECT_COLORS = {
    '英語': {bg:'#fce7f3',col:'#9d174d'},
    '数学': {bg:'#dbeafe',col:'#1e40af'},
    '国語': {bg:'#ffe4e6',col:'#9f1239'},
    '理科': {bg:'#dcfce7',col:'#166534'},
    '社会': {bg:'#fef9c3',col:'#854d0e'},
    '実技': {bg:'#f3e8ff',col:'#6b21a8'}
  };
  // 表形式で使う学年・教科
  var TABLE_GRADES   = ['中1','中2','中3'];
  var TABLE_SUBJECTS = EXAM_SUBJECTS; // ['英語','数学','国語','理科','社会','実技']

  // テスト種別ごとの枠色
  var TYPE_COLORS = {
    '前期中間': {border:'#93c5fd',header:'#eff6ff',htext:'#1e40af'},
    '前期期末': {border:'#6ee7b7',header:'#ecfdf5',htext:'#065f46'},
    '後期中間': {border:'#fcd34d',header:'#fffbeb',htext:'#92400e'},
    '学年末':   {border:'#f9a8d4',header:'#fdf2f8',htext:'#831843'}
  };

  var allTypes = EXAM_TEST_TYPES.concat(Object.keys(groups).filter(function(k){return EXAM_TEST_TYPES.indexOf(k)===-1;}));
  allTypes.forEach(function(testType) {
    var recs = groups[testType] || [];
    var tc = TYPE_COLORS[testType] || {border:'#e5e7eb',header:'#f9fafb',htext:'#374151'};

    html += '<div style="margin-bottom:20px;border:2px solid ' + tc.border + ';border-radius:8px;overflow:hidden">';

    // グループヘッダー
    html += '<div style="background:' + tc.header + ';padding:7px 12px;display:flex;align-items:center;gap:8px">';
    html += '<span style="font-size:13px;font-weight:700;color:' + tc.htext + '">' + testType + '</span>';
    html += '<span style="font-size:11px;color:var(--text-muted)">' + recs.length + '件</span>';
    html += '</div>';

    if (recs.length === 0) {
      html += '<div style="color:var(--text-muted);font-size:12px;padding:8px 12px">データなし</div>';
    } else {
      // 表形式レイアウト
      // 列幅：学年列(44px固定) + 教科列(均等)
      var colCount = TABLE_SUBJECTS.length + 1;
      html += '<div style="overflow-x:auto">';
      html += '<table style="width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed">';

      // 列幅定義
      html += '<colgroup><col style="width:44px">';
      TABLE_SUBJECTS.forEach(function(){ html += '<col>'; });
      html += '</colgroup>';

      // ヘッダー行（教科）
      html += '<thead><tr>';
      html += '<th style="background:#f9fafb;padding:4px;border:1px solid #e5e7eb;text-align:center;font-size:10px;color:#9ca3af"></th>';
      TABLE_SUBJECTS.forEach(function(sj) {
        var sc = SUBJECT_COLORS[sj] || {bg:'#f3f4f6',col:'#374151'};
        html += '<th style="background:' + sc.bg + ';color:' + sc.col + ';padding:4px 6px;border:1px solid #e5e7eb;text-align:center;font-size:11px;font-weight:700">' + sj + '</th>';
      });
      html += '</tr></thead>';

      // データ行（学年）
      html += '<tbody>';
      TABLE_GRADES.forEach(function(grade) {
        html += '<tr>';
        // 学年セル
        html += '<td style="background:#f9fafb;padding:4px;border:1px solid #e5e7eb;text-align:center;font-weight:700;font-size:11px;color:#374151;vertical-align:top;white-space:nowrap">' + grade + '</td>';

        TABLE_SUBJECTS.forEach(function(sj) {
          // この学年×教科に該当するレコードを抽出
          var cellRecs = recs.filter(function(r) {
            var gradeMatch = (r.grade || '').split(',').map(function(x){return x.trim();}).indexOf(grade) !== -1;
            var subjMatch  = r.subject === sj;
            return gradeMatch && subjMatch;
          });

          html += '<td style="border:1px solid #e5e7eb;padding:3px;vertical-align:top;min-width:80px">';
          if (cellRecs.length === 0) {
            html += '<span style="color:#e5e7eb;font-size:10px">－</span>';
          } else {
            cellRecs.forEach(function(r) {
              html += buildExamCardCompact(r);
            });
          }
          html += '</td>';
        });
        html += '</tr>';
      });
      html += '</tbody></table></div>';
    }
    html += '</div>';
  });

  el.innerHTML = html;
  // 編集中カードがあれば再展開
  if (_examEditingId) {
    var el2 = document.querySelector('[data-rid="' + _examEditingId + '"]');
    if (el2) expandExamCard(el2, _examEditingId);
  }
}

function setExamFilter(type, val) {
  if (type === 'grade')   _examGradeFilter   = val;
  if (type === 'subject') _examSubjectFilter = val;
  if (type === 'year')    _examYearFilter    = val;
  renderExam();
}

  var yearOpts = getExamYearOptions();
  var schedYear = String(new Date().getFullYear());

    return '<option value="' + t + '">' + t + '</option>';
  }).join('');

    + '<div><label style="font-size:12px;color:#6b7280">年度</label>'
    + '<select id="esch-year" style="width:100%;margin-top:4px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px">'

    + '<div><label style="font-size:12px;color:#6b7280">開始日 <span style="color:#dc2626">*</span></label>'

    + '<input type="date" id="esch-end" style="width:100%;margin-top:4px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px"></div>'
    + '</div>'
    + '<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px">'
    + '<button class="btn-secondary btn-sm" data-mid="modal-exam-schedule" onclick="closeModal(this.dataset.mid)">キャンセル</button>'
    + '<button class="btn-primary btn-sm" onclick="submitExamSchedule()">登録</button>'
    + '</div>';
  document.getElementById('modal-exam-schedule-body').innerHTML = body;
  openModal('modal-exam-schedule');
}

function submitExamSchedule() {
  var url = localStorage.getItem(GAS_STUDENT_URL_KEY) || '';
  if (!url) { miniToast('GAS URLが未設定です'); return; }
  var testType  = document.getElementById('esch-type').value;
  var year      = document.getElementById('esch-year').value;
  var startDate = document.getElementById('esch-start').value;
  var endDate   = document.getElementById('esch-end').value;
  if (!startDate) { miniToast('開始日を入力してください'); return; }

  var schedule = { testType: testType, year: year, startDate: startDate, endDate: endDate };
  var tmp = { scheduleId: 'tmp_' + Date.now(), testType: testType, year: year, startDate: startDate, endDate: endDate };
  _examSchedules.push(tmp);
  closeModal('modal-exam-schedule');
  renderExam();
  miniToast('日程を追加しました');

  var url = localStorage.getItem(GAS_STUDENT_URL_KEY) || '';
  callGas(url, { action: 'saveExamSchedule', schedule: JSON.stringify(schedule) }, function(res) {
    if (res && res.success) {
      var s = _examSchedules.find(function(x){ return x.scheduleId === tmp.scheduleId; });
      if (s) s.scheduleId = res.scheduleId;
      localStorage.setItem('cb_cache_exam_schedules', JSON.stringify(_examSchedules));
    } else {
      _examSchedules = _examSchedules.filter(function(x){ return x.scheduleId !== tmp.scheduleId; });
      renderExam();
      miniToast('日程保存エラー（再読み込みしてください）');
    }
  }, 'POST');
}

function deleteExamSchedule(scheduleId) {
  var deleted = _examSchedules.find(function(s){ return s.scheduleId === scheduleId; });
  _examSchedules = _examSchedules.filter(function(s){ return s.scheduleId !== scheduleId; });
  renderExam();
  miniToast('日程を削除しました');

  var url = localStorage.getItem(GAS_STUDENT_URL_KEY) || '';
  callGas(url, { action: 'deleteExamSchedule', scheduleId: scheduleId }, function(res) {
    if (!res || !res.success) {
      if (deleted) _examSchedules.push(deleted);
      renderExam();
      miniToast('削除エラー（再読み込みしてください）');
    } else {
      localStorage.setItem('cb_cache_exam_schedules', JSON.stringify(_examSchedules));
    }
  }, 'POST');
}

var _examEditingId = null; // 現在編集中のrecordId（nullなら閲覧モード）
var _currentSchoolDetail = ''; // 現在開いている学校詳細パネルの学校名

function getExamAllSchools() {
  var list = [];
  _students.forEach(function(st) {
    if (st.school && list.indexOf(st.school) === -1
        && st.school.indexOf('小') === -1 && st.school.indexOf('高') === -1) {
      list.push(st.school);
    }
  });
  return list.sort();
}

// 表形式用コンパクトカード（学年×教科セル内）
function buildExamCardCompact(r) {
  var schools = r.schools ? r.schools.split(',').map(function(x){return x.trim();}).join(' ') : '';

    + ' style="cursor:pointer;background:#fff;border:1px solid #e5e7eb;border-radius:4px;padding:3px 5px;margin-bottom:3px;font-size:11px">';

  if (r.materials) h += '<div style="color:#059669;font-size:10px;display:flex;align-items:center;gap:3px"><svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;flex-shrink:0"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg> ' + esc(r.materials) + '</div>';
  h += '</div>';
  return h;
}

// 閲覧モードのカードHTML
function buildExamCard(s) {
  var grades  = s.grade   ? s.grade.split(',').map(function(x){return x.trim();}).join('・') : '－';
  var schools = s.schools ? s.schools.split(',').map(function(x){return x.trim();}).join(' ') : '－';
  var years   = s.years   ? s.years.split(',').map(function(x){return x.trim()+'年度';}).join('・') : '－';
  var metaLine = [grades, schools, years].filter(function(v){return v && v!=='－';}).join('　');
  return '<div class="school-summary-card exam-card" data-rid="' + s.recordId + '" onclick="expandExamCard(this, this.dataset.rid)" style="cursor:pointer;padding:6px 8px">'
    + '<div style="display:flex;align-items:center;gap:5px;justify-content:space-between">'
    + '<div style="display:flex;align-items:center;gap:5px;overflow:hidden;flex:1">'
    + '<span style="background:#dbeafe;color:#1e40af;font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;flex-shrink:0">' + esc(s.subject||'－') + '</span>'
    + '<span style="font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + esc(s.unitName||'（未入力）') + '</span>'
    + '</div>'
    + '<button class="btn-sm" style="background:#fee2e2;color:#dc2626;border:none;padding:2px 7px;border-radius:3px;font-size:10px;cursor:pointer;flex-shrink:0" '
    + 'data-rid="' + s.recordId + '" onclick="event.stopPropagation();deleteExamStrategy(this.dataset.rid)">削除</button>'
    + '</div>'

// カードを編集モードに展開
function expandExamCard(cardEl, recordId) {
  if (_examEditingId === recordId) {
    collapseExamCard(cardEl, recordId);
    return;
  }
  // 他に開いているカードがあれば閉じる
  if (_examEditingId) {
    var prev = document.querySelector('.exam-card[data-rid="' + _examEditingId + '"]');
    if (prev) {
      var prevS = _examStrategies.find(function(x){ return x.recordId === _examEditingId; });
      if (prevS) prev.outerHTML = buildExamCard(prevS);
    }
  }
  _examEditingId = recordId;
  var s = _examStrategies.find(function(x){ return x.recordId === recordId; }) || {};
  cardEl.outerHTML = buildExamCardEdit(s);
  // 単元名にフォーカス
  var unitEl = document.getElementById('ec-unit-' + recordId);
  if (unitEl) { unitEl.focus(); selectAllText(unitEl); }
}

function selectAllText(el) {
  var range = document.createRange();
  range.selectNodeContents(el);
  var sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

// カードを閉じる（recordId指定）
function collapseExamCardById(rid) {

  if (el) collapseExamCard(el, rid);
}

// カードを閉じて閲覧モードに戻す
function collapseExamCard(cardEl, recordId) {
  _examEditingId = null;
  var s = _examStrategies.find(function(x){ return x.recordId === recordId; });
  if (s) {
    cardEl.outerHTML = buildExamCard(s);
  } else {
    // 新規追加キャンセル：カードごと削除
    cardEl.remove();
    _examStrategies = _examStrategies.filter(function(x){ return x.recordId !== recordId; });
    renderExam();
  }
}

// 自動保存
function saveExamCard(rid) {
  var url = localStorage.getItem(GAS_STUDENT_URL_KEY);
  if (!url) { miniToast('GAS URLが設定されていません'); return; }

  var testType = (document.getElementById('ec-tt-' + rid) || {}).value || '';
  var subject  = (document.getElementById('ec-sj-' + rid) || {}).value || '';
  var unitEl   = document.getElementById('ec-unit-' + rid);
  var matEl    = document.getElementById('ec-mat-'  + rid);
  var contEl   = document.getElementById('ec-cont-' + rid);
  var unitName = unitEl ? unitEl.innerText.trim() : '';
  var materials= matEl  ? matEl.innerText.trim()  : '';
  var cont     = contEl ? contEl.innerText.trim()  : '';
  var grades   = Array.from(document.querySelectorAll('.ec-gr-' + rid + ':checked')).map(function(c){return c.value;}).join(',');
  var schools  = Array.from(document.querySelectorAll('.ec-sc-' + rid + ':checked')).map(function(c){return c.value;}).join(',');
  var years    = Array.from(document.querySelectorAll('.ec-yr-' + rid + ':checked')).map(function(c){return c.value;}).join(',');

  if (!testType) { miniToast('テスト種別を選択してください'); return; }
  if (!subject)  { miniToast('教科を選択してください'); return; }
  if (!unitName) { miniToast('単元名を入力してください'); return; }
  if (!grades)   { miniToast('学年を選択してください'); return; }
  if (!schools)  { miniToast('対象校を選択してください'); return; }
  if (!years)    { miniToast('年度を選択してください'); return; }

  var isNew = rid.indexOf('tmp_') === 0;
  var strategy = { recordId: isNew ? '' : rid, testType: testType, subject: subject,
    unitName: unitName, grade: grades, schools: schools,
    content: cont, materials: materials, years: years };

  // _examStrategies を更新
  var idx = _examStrategies.findIndex(function(x){ return x.recordId === rid; });
  if (idx !== -1) {
    Object.assign(_examStrategies[idx], strategy);
    _examStrategies[idx].recordId = rid;
  }

  // カードを閲覧モードに戻してから保存
  var cardEl = document.querySelector('.exam-card[data-rid="' + rid + '"]');
  _examEditingId = null;
  if (cardEl) {
    var displayS = Object.assign({}, strategy, { recordId: rid });
    cardEl.outerHTML = buildExamCard(displayS);
  }
  miniToast('保存中...');

  var tmpId = rid;
  callGas(url, { action: 'saveExamStrategy', strategy: JSON.stringify(strategy) }, function(res) {
    if (res && res.success) {
      if (isNew && res.recordId) {
        var s2 = _examStrategies.find(function(x){ return x.recordId === tmpId; });
        if (s2) {
          s2.recordId = res.recordId;
          // DOMのdata-ridも更新
          var el2 = document.querySelector('.exam-card[data-rid="' + tmpId + '"]');
          if (el2) el2.dataset.rid = res.recordId;
        }
      }
      miniToast('保存しました');
    } else {
      miniToast('保存エラー（再読み込みしてください）');
    }
  }, 'POST');
}

function cancelExamCard(rid) {
  var cardEl = document.querySelector('.exam-card[data-rid="' + rid + '"]');
  _examEditingId = null;
  var isNew = rid.indexOf('tmp_') === 0;
  if (isNew) {
    // 新規追加キャンセル：_examStrategiesから削除してカードも消す
    _examStrategies = _examStrategies.filter(function(x){ return x.recordId !== rid; });
    if (cardEl) cardEl.remove();
  } else {
    // 既存レコードのキャンセル：元のデータで閲覧モードに戻す
    var s = _examStrategies.find(function(x){ return x.recordId === rid; });
    if (s && cardEl) cardEl.outerHTML = buildExamCard(s);
  }
}

// ＋ 追加：空カードをグリッド先頭に差し込む
function addNewExamCard() {
  var tmpId = 'tmp_' + Date.now();
  var newS = { recordId: tmpId, testType: '前期中間', subject: '', unitName: '',
    grade: '', schools: '', content: '', materials: '',
    years: String(new Date().getFullYear()) };
  _examStrategies.unshift(newS);
  renderExam();
  // 先頭カードを展開
  setTimeout(function() {
    var el = document.querySelector('.exam-card[data-rid="' + tmpId + '"]');
    if (el) expandExamCard(el, tmpId);
  }, 0);
}

function deleteExamStrategy(recordId) {
  if (!confirm('このレコードを削除しますか？')) return;
  var url = localStorage.getItem(GAS_STUDENT_URL_KEY);
  if (!url) return;

  // 楽観的UI更新：先に画面から消してからGASに削除
  var deleted = _examStrategies.find(function(s){ return s.recordId === recordId; });
  _examStrategies = _examStrategies.filter(function(s){ return s.recordId !== recordId; });
  renderExam();
  miniToast('削除しました');

  // 裏でGASに削除（失敗したら元に戻す）
  callGas(url, { action: 'deleteExamStrategy', recordId: recordId }, function(res) {
    if (!res || !res.success) {
      if (deleted) _examStrategies.push(deleted); // 元に戻す
      renderExam();
      miniToast('削除エラー（再読み込みしてください）');
    }
  }, 'POST');
}

// 欠席・振替タブ
// =====================================================

// 欠席レコードの日付を yyyy-MM-dd に正規化（GASがDate型で返した場合の対策）

// コマの人数カウントラベルを生成する
// students: 通常在籍の生徒配列, dateStr: 'yyyy-MM-dd', komaTime: 時間帯文字列, classroom: 教室名
function komaCountLabel_(students, dateStr, komaTime, classroom) {
  // 振替来塾者を追加（通常在籍にいない生徒のみ）
  var subStudents = (_absenceRecords || [])
    .filter(function(r) {
      return r.substituteDate === dateStr &&
             r.substituteKomaTime === komaTime &&
             r.substituteClassroom === classroom &&
             r.status === 'scheduled' &&
             !students.find(function(s){ return s.name === r.studentName; });
    })
    .map(function(r) {
      return (_students || []).find(function(s){ return s.name === r.studentName; }) || { name: r.studentName };
    });

  // 欠席者を除外
  var absentNames = (_absenceRecords || [])
    .filter(function(r) {
      return r.absenceDate === dateStr &&
             r.komaTime === komaTime &&
             r.classroom === classroom &&
             r.status !== 'cancelled';
    })
    .map(function(r){ return r.studentName; });

  var all = students.concat(subStudents).filter(function(s){
    if (absentNames.indexOf(s.name) >= 0) return false;
    // 対象コマが online 設定の生徒は除外
    var komas = s.komas || [];
    var isOnline = komas.some(function(k){
      return k.classroom === classroom && k.time === komaTime && k.online === true;
    });
    return !isOnline;
  });

  if (all.length === 0) return '';

  var sho = 0, chu = 0, ko = 0, other = 0;
  all.forEach(function(s) {
    var g = s.grade || '';
    if (g.indexOf('小') === 0) sho++;
    else if (g.indexOf('中') === 0) chu++;
    else if (g.indexOf('高') === 0) ko++;
    else other++;
  });

  var parts = [];
  if (sho > 0)   parts.push('小' + sho);
  if (chu > 0)   parts.push('中' + chu);
  if (ko > 0)    parts.push('高' + ko);
  if (other > 0) parts.push('他' + other);

  var total = all.length;
  return { label: parts.join('・') + '（計' + total + '人）', total: total };
}


// コース名からハッシュ値で色を自動決定
var COURSE_COLORS = [
  { bg: '#dbeafe', color: '#1d4ed8' }, // 青
  { bg: '#dcfce7', color: '#166534' }, // 緑
  { bg: '#ede9fe', color: '#6d28d9' }, // 紫
  { bg: '#fef9c3', color: '#a16207' }, // 黄
  { bg: '#fee2e2', color: '#dc2626' }, // 赤
  { bg: '#ffedd5', color: '#c2410c' }, // オレンジ
  { bg: '#f0fdf4', color: '#15803d' }, // 薄緑
  { bg: '#fce7f3', color: '#be185d' }, // ピンク
];
function courseColor_(name) {
  if (!name) return null;
  var hash = 0;
  for (var i = 0; i < name.length; i++) {
    hash = (hash * 31 + name.charCodeAt(i)) & 0xfffffff;
  }
  return COURSE_COLORS[hash % COURSE_COLORS.length];
}

function normalizeAbsenceRecord_(r) {
  function toIso(v) {
    if (!v || v === '') return '';
    // すでに yyyy-MM-dd 形式ならそのまま
    if (/^\d{4}-\d{2}-\d{2}$/.test(String(v))) return String(v);
    var d = new Date(v);
    if (isNaN(d.getTime())) return String(v);
    var mm = ('0' + (d.getMonth() + 1)).slice(-2);
    var dd = ('0' + d.getDate()).slice(-2);
    return d.getFullYear() + '-' + mm + '-' + dd;
  }
  return Object.assign({}, r, {
    absenceDate:    toIso(r.absenceDate),
    substituteDate: toIso(r.substituteDate)
  });
}


function renderAbsence() {
  var studentUrl = localStorage.getItem(GAS_STUDENT_URL_KEY) || '';
  var todayIso = getTodayStr();

  // 振替待ちアラート（本日が振替予定日の生徒）
  var todaySubAlerts = (_absenceRecords || []).filter(function(r) {
    return r.substituteDate === todayIso && r.status === 'scheduled';
  });

  var alertHtml = '';
  if (todaySubAlerts.length) {
    alertHtml = '<div class="ac-alert" style="margin-bottom:12px">⚠️ 本日振替予定の生徒がいます：' +
      todaySubAlerts.map(function(r){ return '<strong>' + esc(r.studentName) + '</strong>（' + esc(r.substituteKomaTime||'') + '）'; }).join('、') +
      '</div>';
  }

  // 振替待ち（未確定）リスト
  var waiting = (_absenceRecords || []).filter(function(r) {
    return r.status === 'absent'; // 振替日未定のみ
  });
  var scheduled = (_absenceRecords || []).filter(function(r) {
    return r.status === 'scheduled'; // 振替日確定済み
  });
  // 振替済み（直近30日）
  var done30 = (_absenceRecords || []).filter(function(r) {
    var d30 = new Date(); d30.setDate(d30.getDate() - 30);
    return (r.status === 'substituted' || r.status === 'done') &&
      r.absenceDate >= isoDate(d30);
  });

  function cardHtml(r) {
    var statusBadge = '';
    var cardCls = 'absence-card';
    if (r.status === 'absent') {
      statusBadge = '<span class="ac-badge ac-badge-red">振替待ち</span>';
      cardCls += ' ac-waiting';
    } else if (r.status === 'scheduled') {
      statusBadge = '<span class="ac-badge" style="background:#dbeafe;color:#1d4ed8">振替確定</span>';
      cardCls += ' ac-waiting'; // 左赤ボーダーは維持（まだ来塾前）
    } else if (r.status === 'substituted' || r.status === 'done') {
      statusBadge = '<span class="ac-badge ac-badge-green">振替済</span>';
      cardCls += ' ac-substituted';
    }
    // 振替先情報
    var subInfo = '';
    if (r.substituteDate) {
      subInfo = '振替：' + esc(r.substituteDate) + ' ' + esc(r.substituteKomaTime||'') + ' ' + esc(r.substituteClassroom||'');
    }
    // 振替設定UI（振替待ちのみ）
    var setSubHtml = '';
    if (r.status === 'absent' || r.status === 'scheduled') { // 両方とも変更可
      var uid = 'sub_' + (r.id || '').replace(/[^a-z0-9]/gi,'_');
      setSubHtml = '<div class="ac-set-sub" id="set-sub-' + uid + '">' +
        '<input type="date" id="sub-date-' + uid + '" value="' + esc(r.substituteDate||'') + '" style="width:130px" />' +
        '<select id="sub-koma-' + uid + '">' +
          getAllKomaOptions(r.substituteKomaTime) +
        '</select>' +
        '<select id="sub-cr-' + uid + '">' +
          '<option value="北久里浜"' + (r.substituteClassroom==='北久里浜'?' selected':'') + '>北久里浜</option>' +
          '<option value="久里浜"'   + (r.substituteClassroom==='久里浜'  ?' selected':'') + '>久里浜</option>' +
        '</select>' +
        '<button class="btn-primary btn-sm" onclick="saveSubstitute(\'' + (r.id||'') + '\',\'' + uid + '\')">振替確定</button>' +
        '<button class="btn-secondary btn-sm" onclick="cancelAbsence(\'' + (r.id||'') + '\')">キャンセル</button>' +
      '</div>';
    }
    return '<div class="' + cardCls + '">' +
      '<div class="ac-header">' +
        '<span class="ac-name">' + esc(r.studentName) + '</span>' +
        statusBadge +
        (r.absenceDate ? '<span class="ac-detail">欠席日：' + esc(r.absenceDate) + ' ' + esc(r.komaTime||'') + ' ' + esc(r.classroom||'') + '</span>' : '') +
      '</div>' +
      (subInfo ? '<div class="ac-detail">' + subInfo + '</div>' : '') +
      (r.memo ? '<div class="ac-detail" style="color:var(--text-main)">メモ：' + esc(r.memo) + '</div>' : '') +
      '<div class="ac-actions">' + setSubHtml + '</div>' +
    '</div>';
  }

  var activeRecords = waiting.concat(scheduled); // 振替待ち＋振替確定（まだ来塾前）
  var waitingHtml = activeRecords.length
    ? activeRecords.map(cardHtml).join('')
    : '<div class="absence-empty">対応が必要な欠席はありません ✓</div>';

  var doneHtml = done30.length
    ? '<details style="margin-top:16px"><summary style="cursor:pointer;font-size:13px;color:var(--text-muted);user-select:none">過去30日の振替済み（' + done30.length + '件）</summary><div style="margin-top:8px;display:flex;flex-direction:column;gap:8px">' + done30.map(cardHtml).join('') + '</div></details>'
    : '';

  var helpHtml = '<span class="cb-help"><span class="cb-help-icon">?</span>' +
    '<span class="cb-help-body">【欠席ボタン】本日・今週タブの生徒名横の「欠」ボタンで欠席を記録します。<br><br>【振替待ちリスト】欠席登録した生徒が一覧に表示されます。振替日時が決まったら「振替確定」で登録してください。<br><br>【連鎖欠席】振替予定の生徒がさらに欠席した場合は「↩」ボタンで連鎖欠席を記録できます。<br><br>【アラート】本日振替予定の生徒がいる場合は画面上部に表示されます。</span>' +
    '</span>';

  document.getElementById('main-content').innerHTML =

function getAllKomaOptions(selected) {
  // 全教室の全コマ時間帯を集約
  var komaSet = {};
  (_students || []).forEach(function(s) {
    (s.komas || []).forEach(function(k) { if (k.time) komaSet[k.time] = true; });
  });
  var komas = Object.keys(komaSet).sort();
  if (!komas.length) komas = ['15:00〜16:30','16:30〜18:00','18:00〜19:30','19:30〜21:00'];
  return '<option value="">コマ選択</option>' +
    komas.map(function(k) {
      return '<option value="' + esc(k) + '"' + (selected===k?' selected':'') + '>' + esc(k) + '</option>';
    }).join('');
}

function reloadAbsence() {
  var studentUrl = localStorage.getItem(GAS_STUDENT_URL_KEY) || '';
  if (!studentUrl) return;
  callGas(studentUrl, { action: 'getAbsenceRecords' }, function(res) {
    if (res && res.success && res.records) {
      _absenceRecords = res.records.map(normalizeAbsenceRecord_);
      localStorage.setItem('cb_cache_absence_records', JSON.stringify(_absenceRecords));
    }
    renderAbsence();
  });
}

function openAbsenceModal(studentName, dateStr, komaTime, classroom, chainFromId, courseName) {
  // 重複チェック
  var existing = (_absenceRecords || []).find(function(r) {
    return r.studentName === studentName &&
           r.absenceDate === dateStr &&
           r.komaTime === komaTime &&
           r.status !== 'cancelled';
  });
  if (existing && !chainFromId) {
    miniToast('⚠️ この生徒はすでに欠席登録済みです');
    return;
  }

  _absenceModalData = {
    studentName: studentName,
    dateStr:     dateStr,
    komaTime:    komaTime,
    classroom:   classroom,
    chainFromId: chainFromId || '',
    courseName:  courseName  || ''
  };

  // モーダル表示
  var mo = document.getElementById('modal-absence');
  if (!mo) return;
  document.getElementById('abs-modal-name').textContent = studentName;
  document.getElementById('abs-modal-date').textContent = dateStr + ' ' + komaTime + (courseName ? ' (' + courseName + ')' : '');

  // メモリセット
  document.getElementById('abs-modal-memo-a') && (document.getElementById('abs-modal-memo-a').value = '');
  document.getElementById('abs-modal-memo-b') && (document.getElementById('abs-modal-memo-b').value = '');

  // Step2B の初期値セット（本日・13:00・欠席した教室）
  var dateB = document.getElementById('abs-b-date');
  var timeB = document.getElementById('abs-b-time');
  var crB   = document.getElementById('abs-b-cr');
  if (dateB) dateB.value = getTodayStr();
  if (timeB) timeB.value = '13:00';
  if (crB)   crB.value   = classroom;

  // Step2A のコマ選択肢を生成・教室をデフォルトセット
  var komaEl = document.getElementById('abs-sub-koma');
  if (komaEl) komaEl.innerHTML = getAllKomaOptions('');
  var crA = document.getElementById('abs-sub-cr');
  if (crA) crA.value = classroom;
  var subTime = document.getElementById('abs-sub-time');
  if (subTime) subTime.value = '';

  // Step1 を表示
  showAbsStep('1');
  openModal('modal-absence');
}

// モーダルのステップ切り替え
function showAbsStep(step) {
  document.getElementById('abs-step1').style.display  = (step === '1') ? '' : 'none';
  document.getElementById('abs-step2a').style.display = (step === 'A') ? '' : 'none';
